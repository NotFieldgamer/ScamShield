name: backend-ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The MiniLM embedding model (~90 MB) is gitignored, so the tests — which load the full
      # Spring context and build the real EmbeddingService — need it fetched here onto the
      # classpath. Uses the EMBEDDING_MODEL_URL secret/variable if set (the same URL used for the
      # Render build), else a public all-MiniLM-L6-v2 ONNX (verified compatible with the pipeline).
      - name: Fetch MiniLM embedding model
        env:
          MODEL_URL: ${{ secrets.EMBEDDING_MODEL_URL || vars.EMBEDDING_MODEL_URL || 'https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx' }}
        run: curl -fSL "$MODEL_URL" -o src/main/resources/models/minilm.onnx

      # GitHub-hosted ubuntu runners ship a running Docker daemon, which
      # Testcontainers uses to start Postgres + pgvector for the integration test.
      - name: Test
        run: ./gradlew --no-daemon test

  build-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the deployment Dockerfile (repo root, repo-root context). No
      # EMBEDDING_MODEL_URL is passed here, so the model download is skipped — this only
      # verifies the image builds.
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: verity-backend:ci
