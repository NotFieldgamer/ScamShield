# Render Blueprint for the Verity API.
# On connect, Render reads this file and provisions the web service below. Secret values are NOT
# stored here — every var with `sync: false` must be filled in from the Render dashboard.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: verity-api
    runtime: docker
    plan: free # 512 MB RAM, 0.1 CPU, sleeps after 15 min idle (cold start on next request)
    region: oregon # free tier: oregon | frankfurt | singapore | ohio | virginia
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      # ---- Database (Postgres + pgvector, e.g. Neon or Supabase) ----
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # ---- Redis (rate limiting / hot-verdict cache, e.g. Upstash). Optional — fails open. ----
      - key: SPRING_DATA_REDIS_URL
        sync: false
      # ---- Auth (Clerk). Both required — the app won't start without them. ----
      # Issuer, e.g. https://<slug>.clerk.accounts.dev. Tokens whose `iss` differs are rejected.
      - key: CLERK_ISSUER
        sync: false
      # Backend API key (sk_...); reads a new user's email once, when their local row is created.
      - key: CLERK_SECRET_KEY
        sync: false
      # ---- CORS: the single browser origin allowed to call the API (your Vercel frontend) ----
      - key: CORS_ALLOWED_ORIGIN
        sync: false
      # ---- Embedding model: URL the Docker build fetches the ~90 MB MiniLM model from ----
      - key: EMBEDDING_MODEL_URL
        sync: false
    # PORT is injected by Render automatically; the app reads it via server.port=${PORT:8080}.
