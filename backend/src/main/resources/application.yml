spring:
  application:
    name: verity
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/verity}
    username: ${SPRING_DATASOURCE_USERNAME:verity}
    password: ${SPRING_DATASOURCE_PASSWORD:verity}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Never let Hibernate create or alter DDL.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      # Bulk CSV upload cap. Bounds one request's work together with the row cap in the controller.
      max-file-size: 1MB
      max-request-size: 1MB

# Auth configuration. Clerk issues session tokens; this app only verifies them, so it holds no
# signing key at all. Neither value has a default: without an issuer nothing can be verified and
# every request would 401, and a deploy that boots green with all authentication dead is worse
# than one that fails loudly. Missing means refuse to start.
app:
  clerk:
    # Clerk instance's issuer, e.g. https://<slug>.clerk.accounts.dev. Its JWKS is discovered from
    # here and every token's `iss` must match it, which is what makes tokens from any other Clerk
    # instance useless against this API. No trailing slash: it is concatenated onto the JWKS path
    # and compared verbatim against the token's `iss`.
    issuer: ${CLERK_ISSUER}
    # Where the signing keys live. Blank means "<issuer>/.well-known/jwks.json", which is Clerk's
    # layout; override only if that ever stops being true.
    jwks-uri: ${CLERK_JWKS_URI:}
    # Backend API key (sk_...). Used once per user, to read their email when their local row is
    # first provisioned. Never sent to the browser.
    secret-key: ${CLERK_SECRET_KEY}
  cors:
    # Only the deployed frontend origin may call the API from a browser.
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
  embedding:
    # MiniLM (~90MB) is not committed. The Docker build downloads it to this path; the app
    # reads it here at runtime. Local dev/tests fall back to a classpath copy if present.
    model-path: ${EMBEDDING_MODEL_PATH:/app/models/minilm.onnx}

server:
  # Render injects the port to bind on as $PORT; default to 8080 for local dev.
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    # Redis is used only for best-effort rate limiting (fails open); it must not gate liveness.
    redis:
      enabled: false
  info:
    # Do not expose OS/Java version to callers of the public /actuator/info endpoint —
    # that is reconnaissance material (CWE-200). Leave them off.
    java:
      enabled: false
    os:
      enabled: false

logging:
  # Native Spring Boot structured logging — ECS JSON to stdout, no extra dependency.
  structured:
    format:
      console: ecs
  level:
    root: INFO
