spring:
  application:
    name: scam-shield
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scamshield}
    username: ${SPRING_DATASOURCE_USERNAME:scamshield}
    password: ${SPRING_DATASOURCE_PASSWORD:scamshield}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Never let Hibernate create or alter DDL.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      # Bulk CSV upload cap. Bounds one request's work together with the row cap in the controller.
      max-file-size: 1MB
      max-request-size: 1MB

# Auth configuration. The signing secret has no default — the app refuses to start
# without JWT_SECRET, so a signing key is never committed to the repo.
app:
  jwt:
    secret: ${JWT_SECRET:}
    access-ttl: ${JWT_ACCESS_TTL:PT15M}   # 15-minute access token (ISO-8601 duration)
  refresh:
    ttl: ${REFRESH_TTL:P7D}               # 7-day rotating refresh token
  cors:
    # Only the deployed frontend origin may call the API from a browser.
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
  embedding:
    # MiniLM (~90MB) is not committed. The Docker build downloads it to this path; the app
    # reads it here at runtime. Local dev/tests fall back to a classpath copy if present.
    model-path: ${EMBEDDING_MODEL_PATH:/app/models/minilm.onnx}

server:
  # Render injects the port to bind on as $PORT; default to 8080 for local dev.
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    # Redis is used only for best-effort rate limiting (fails open); it must not gate liveness.
    redis:
      enabled: false
  info:
    # Do not expose OS/Java version to callers of the public /actuator/info endpoint —
    # that is reconnaissance material (CWE-200). Leave them off.
    java:
      enabled: false
    os:
      enabled: false

logging:
  # Native Spring Boot structured logging — ECS JSON to stdout, no extra dependency.
  structured:
    format:
      console: ecs
  level:
    root: INFO
