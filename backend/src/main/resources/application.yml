spring:
  application:
    name: scam-shield
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scamshield}
    username: ${SPRING_DATASOURCE_USERNAME:scamshield}
    password: ${SPRING_DATASOURCE_PASSWORD:scamshield}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Never let Hibernate create or alter DDL.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # Cloud Run injects PORT; default to 8080 locally.
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    java:
      enabled: true
    os:
      enabled: true

logging:
  # Native Spring Boot structured logging — ECS JSON to stdout, no extra dependency.
  structured:
    format:
      console: ecs
  level:
    root: INFO
